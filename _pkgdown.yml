url: https://mpio-be.github.io/DataEntry/

template:
  bootstrap: 5
  bootswatch: flatly

navbar:
  structure:
    left: [ intro, reference, articles, news ]
    right: [ github ]

home:
  sidebar:
    structure: [ custom_links, license, citation, authors, dev ]
    components:
      custom_links:
        title: Links
        text: |
          * [Browse source code](https://github.com/mpio-be/DataEntry)
          * [Report a bug](https://github.com/mpio-be/DataEntry/issues)

articles:
- title: Articles
  navbar: ~
  contents:
  - matches(".*")

reference:
- title: Apps
  contents:
  - ui_append_rows
  - ui_edit_table
  - ui_edit_inspectors
  - server_append_rows
  - server_edit_table
  - server_edit_inspectors

- title: Database
  contents:
  - db_con
  - db_get

- title: Validation
  contents:
  - validators
  - try_validator
  - evalidators
